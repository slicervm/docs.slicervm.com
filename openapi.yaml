  /vm/{hostname}/fs/watch:
    get:
      summary: Watch filesystem changes (Server-Sent Events)
      description: |
        Opens a long-lived Server-Sent Events stream of filesystem changes inside
        the VM, backed by inotify via fsnotify. Each SSE `data:` payload is a
        JSON `WatchEvent`; each event also carries a monotonic `id:` line.

        The agent emits SSE heartbeat comments (`:\n\n`) every 15 seconds while
        idle so proxies and NAT timeouts do not drop the connection.

        `Last-Event-ID` is accepted for forward compatibility and validated
        (must be a uint64), but the current implementation does not retain
        events across disconnects — reconnecting always starts a fresh
        monotonic id stream. A future release may add cross-connection
        replay; use the field now so clients do not need to change later.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
        - in: query
          name: paths
          description: One or more paths to watch. Repeat the parameter for multiple paths.
          required: true
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
        - in: query
          name: patterns
          description: Optional glob patterns; matched against full path and basename.
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
        - in: query
          name: events
          description: Event types to deliver. Values — create, write, remove, rename, chmod, all. Empty defaults to all.
          schema:
            type: array
            items:
              type: string
              enum: [create, write, remove, rename, chmod, all]
          style: form
          explode: true
        - in: query
          name: recursive
          description: Walk directory targets and watch all subdirectories (and newly-created ones).
          schema: { type: boolean }
        - in: query
          name: one_shot
          description: Close the stream after the first event is delivered.
          schema: { type: boolean }
        - in: query
          name: debounce
          description: Go duration (e.g. 200ms). Coalesces bursts per type+path. Default 200ms.
          schema: { type: string }
        - in: query
          name: timeout
          description: Go duration. If set, closes the stream after this duration.
          schema: { type: string }
        - in: query
          name: max_events
          description: Close the stream after this many events have been delivered.
          schema: { type: integer }
        - in: query
          name: uid
          schema: { type: integer, format: uint32 }
        - in: header
          name: Last-Event-ID
          description: Last event id observed on a previous connection; accepted for forward compatibility.
          schema: { type: string }
      responses:
        "200":
          description: "SSE event stream. Each event has `id:`, `event: watch`, and a JSON `data:` payload."
          content:
            text/event-stream:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: uint64
                  type:
                    type: string
                    enum: [create, write, remove, rename, chmod]
                  path:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  size:
                    type: integer
                    format: int64
                  isDir:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "404":
          description: VM not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "409":
          description: VM paused
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /vm/{hostname}/shell:
    get:
      summary: Interactive shell (WebSocket upgrade)
      description: WebSocket endpoint for VM shell. Optional query params for uid/gid/shell/cwd.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
        - in: query
          name: uid
          schema: { type: integer, format: uint32 }
        - in: query
          name: gid
          schema: { type: integer, format: uint32 }
        - in: query
          name: shell
          schema: { type: string }
        - in: query
          name: cwd
          schema: { type: string }
      responses:
        "101":
          description: Switching Protocols (WebSocket)
        "400":
          description: Invalid request or agent capability mismatch
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "404":
          description: VM not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "409":
          description: VM paused
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
      x-websocket: true

  /vm/{hostname}/forward:
    get:
      summary: Forward TCP via VM agent (inlets)
      description: |
        Tunnel forward endpoint. The router does not restrict HTTP method; typically used
        with CONNECT/upgrade semantics by the inlets client.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tunnel established or proxying
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "404":
          description: VM not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus metrics text
          content:
            text/plain:
              schema: { type: string }

  /proxy/v1/clients:
    get:
      summary: List slicer-proxy clients
      description: |
        Returns all registered proxy clients. Tokens are never returned by
        any list endpoint; lost-token recovery is delete + create.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProxyClient' }
    post:
      summary: Create a slicer-proxy client
      description: |
        Mints a new client. The returned token is shown once and is the
        only way to authenticate against the data-plane CONNECT listener.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProxyClientRequest' }
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyClientCreated' }
        "400":
          description: Missing or invalid name
          content:
            text/plain:
              schema: { type: string }
        "409":
          description: Client name or supplied token already exists
          content:
            text/plain:
              schema: { type: string }

  /proxy/v1/clients/{name}:
    get:
      summary: List a client's allow rules in declaration order
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Client's rules
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProxyAllowRule' }
        "404":
          description: Unknown client
          content:
            text/plain:
              schema: { type: string }
    delete:
      summary: Delete a client (revokes token + drops every rule the client owned)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Client deleted
        "404":
          description: Unknown client
          content:
            text/plain:
              schema: { type: string }

  /proxy/v1/secrets:
    get:
      summary: List slicer-proxy secrets (values never returned)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of secrets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProxySecret' }
    post:
      summary: Register an upstream credential
      description: |
        The plaintext credential is stored on the proxy and injected into
        the inner request when an allow rule references this secret. With
        type=bearer, value is the raw token. With type=basic, value must
        be in user:pass form (the proxy base64-encodes it).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProxySecretRequest' }
      responses:
        "201":
          description: Secret created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxySecret' }
        "400":
          description: Missing required fields, unsupported type, or basic value not in user:pass form
          content:
            text/plain:
              schema: { type: string }
        "409":
          description: Secret name already exists
          content:
            text/plain:
              schema: { type: string }

  /proxy/v1/secrets/{name}:
    delete:
      summary: Delete a secret
      description: |
        Allow rules that reference a deleted secret stop matching until
        the secret is recreated or the rule is rewritten — they do not
        fall through to pass-through allow.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Secret deleted
        "404":
          description: Unknown secret
          content:
            text/plain:
              schema: { type: string }

  /proxy/v1/allows:
    post:
      summary: Add an allow rule
      description: |
        First-match-wins by declaration order. Rules with `secret` set
        strip the client-supplied Authorization header and replace it
        with a secret-derived header on the inner request. Rules without
        `secret` are pass-through allows (audit + MITM, no header swap).

        Multiple rules per host are allowed when `methods` or `paths`
        differ — typically used to bind a privileged secret to a narrow
        admin path (e.g. `/system/*`) and a separate pass-through rule
        for everything else on the same host. Add the most specific
        (narrowest) rule first.

        CONNECT itself is restricted to ports 80 and 443 regardless of
        rule shape — opening tunnels to ssh/postgres-style ports on an
        otherwise allowed host is denied at the proxy.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddProxyAllowRequest' }
      responses:
        "201":
          description: Rule added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyAllowRule' }
        "400":
          description: Unknown client, unknown secret, or missing fields
          content:
            text/plain:
              schema: { type: string }
        "409":
          description: An exact-duplicate rule (same host, methods and paths) already exists for this client
          content:
            text/plain:
              schema: { type: string }

  /proxy/v1/allows/{client}/{host}:
    delete:
      summary: Remove an allow rule
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: client
          required: true
          schema: { type: string }
        - in: path
          name: host
          required: true
          description: URL-escaped upstream host (e.g. `api.github.com`).
          schema: { type: string }
      responses:
        "204":
          description: Rule removed
        "400":
          description: Malformed path
          content:
            text/plain:
              schema: { type: string }
        "404":
          description: No matching rule
          content:
            text/plain:
              schema: { type: string }
