            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /vm/{hostname}/pause:
    post:
      summary: Pause VM
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Pause initiated
          content:
            text/plain:
              schema: { type: string }
        "404":
          description: VM not found
