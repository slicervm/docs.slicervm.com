openapi: 3.0.3
info:
  title: Slicer API
  version: "0.1.71"
  description: |
    REST API for Slicer VM management. Derived from server routes and SDK types.
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SlicerInfo:
      type: object
      properties:
        version:
          type: string
        git_commit:
          type: string

    SlicerHostGroup:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
        ram_bytes:
          type: integer
          format: int64
        cpus:
          type: integer
        gpu_count:
          type: integer
        arch:
          type: string

    NodeResponse:
      type: object
      properties:
        hostname:
          type: string
        hostgroup:
          type: string
        ip:
          type: string
        ram_bytes:
          type: integer
          format: int64
        cpus:
          type: integer
        created_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        arch:
          type: string
        status:
          type: string
          description: "Running or Paused"

    SlicerSnapshot:
      type: object
      properties:
        hostname:
          type: string
        arch:
          type: string
        timestamp:
          type: string
          format: date-time
        uptime:
          type: string
        totalCpus:
          type: integer
        totalMemory:
          type: integer
          format: uint64
        memoryUsed:
          type: integer
          format: uint64
        memoryAvailable:
          type: integer
          format: uint64
        memoryUsedPercent:
          type: number
          format: float
        loadAvg1:
          type: number
          format: float
        loadAvg5:
          type: number
          format: float
        loadAvg15:
          type: number
          format: float
        diskReadTotal:
          type: number
          format: float
        diskWriteTotal:
          type: number
          format: float
        networkReadTotal:
          type: number
          format: float
        networkWriteTotal:
          type: number
          format: float
        diskIOInflight:
          type: integer
          format: int64
        openConnections:
          type: integer
          format: int64
        openFiles:
          type: integer
          format: int64
        entropy:
          type: integer
          format: int64
        diskSpaceTotal:
          type: integer
          format: uint64
        diskSpaceUsed:
          type: integer
          format: uint64
        diskSpaceFree:
          type: integer
          format: uint64
        diskSpaceUsedPercent:
          type: number
          format: float

    NodeStatResponse:
      allOf:
        - $ref: '#/components/schemas/NodeResponse'
        - type: object
          properties:
            snapshot:
              $ref: '#/components/schemas/SlicerSnapshot'
            error:
              type: string

    Secret:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
          format: int64
        permissions:
          type: string
        uid:
          type: integer
          format: uint32
        gid:
          type: integer
          format: uint32
        mod_time:
          type: string
          format: date-time
      required: [name, size, permissions, uid, gid, mod_time]

    CreateSecretRequest:
      type: object
      properties:
        name:
          type: string
        permissions:
          type: string
        uid:
          type: integer
          format: uint32
        gid:
          type: integer
          format: uint32
        data:
          type: string
          description: Base64-encoded secret content
      required: [name, data]

    UpdateSecretRequest:
      type: object
      properties:
        permissions:
          type: string
        uid:
          type: integer
          format: uint32
        gid:
          type: integer
          format: uint32
        data:
          type: string
          description: Base64-encoded secret content

    SlicerCreateNodeRequest:
      type: object
      description: Combined from LaunchParams and SDK request.
      properties:
        hostname:
          type: string
        ip:
          type: string
        ram_bytes:
          type: integer
          format: int64
        cpus:
          type: integer
        gpu_count:
          type: integer
        persistent:
          type: boolean
        disk_image:
          type: string
        import_user:
          type: string
        ssh_keys:
          type: array
          items:
            type: string
        protected:
          type: boolean
        userdata:
          type: string
        tags:
          type: array
          items:
            type: string
        secrets:
          type: array
          items:
            type: string
        pci_devices:
          type: array
          items:
            type: string

    SlicerCreateNodeResponse:
      type: object
      properties:
        hostname:
          type: string
        hostgroup:
          type: string
        ip:
          type: string
        created_at:
          type: string
          format: date-time
        arch:
          type: string

    SlicerDeleteResponse:
      type: object
      properties:
        message:
          type: string
        disk_removed:
          type: string
        error:
          type: string

    SlicerLogsResponse:
      type: object
      properties:
        hostname:
          type: string
        lines:
          type: integer
        content:
          type: string

    SlicerExecRequestQuery:
      type: object
      description: Query parameters used by /vm/{hostname}/exec
      properties:
        cmd:
          type: string
        args:
          type: array
          items:
            type: string
        uid:
          type: integer
          format: uint32
        gid:
          type: integer
          format: uint32
        stdin:
          type: boolean
        stdout:
          type: boolean
        stderr:
          type: boolean
        shell:
          type: string
        cwd:
          type: string
        permissions:
          type: string
        buffered:
          type: boolean
          description: Return a single buffered response instead of streaming NDJSON.
        background:
          type: boolean
          description: >-
            Launch the process detached with a per-process ring buffer. The
            server returns 201 Created with an `exec_id` that can be used with
            the other `/vm/{hostname}/exec/{exec_id}/...` endpoints. Stdin and
            `buffered=true` are rejected in this mode.
        ring_bytes:
          type: integer
          format: int64
          description: >-
            Per-process ring buffer cap in bytes when `background=true`. Zero
            (or omitted) means the server default of 1 MiB. Server rejects
            values larger than the agent-wide budget.

    SlicerExecWriteResult:
      type: object
      properties:
        type:
          type: string
          description: >-
            Frame type. Foreground /exec emits `started`, `stdout`, `stderr`,
            `exit`. Background-exec log streams additionally emit `gap`
            frames when the ring buffer has evicted history since the reader
            last saw it.
        pid:
          type: integer
        data:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        signal:
          type: string
        timestamp:
          type: string
          format: date-time
        stdout:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
        error:
          type: string
        id:
          type: integer
          format: uint64
          description: >-
            Monotonic per-exec frame id. Set only on background-exec log
            frames; absent on foreground /exec streams.
        dropped_bytes:
          type: integer
          format: int64
          description: >-
            On `type=gap` frames: bytes evicted since the previous reader
            cursor.
        dropped_frames:
          type: integer
          description: >-
            On `type=gap` frames: frame count evicted since the previous
            reader cursor.
        message:
          type: string
          description: On `type=gap` frames, a human-readable reason.

    ExecBackgroundResponse:
      type: object
      description: >-
        Response to POST /vm/{hostname}/exec?background=true. The exec_id is
        an opaque server-chosen string — use it with the other
        /vm/{hostname}/exec/{exec_id}/... endpoints.
      properties:
        exec_id:
          type: string
        pid:
          type: integer
        started_at:
          type: string
          format: date-time
        ring_bytes:
          type: integer
          format: int64

    ExecBackgroundInfo:
      type: object
      description: Snapshot of a single background-exec registry entry.
      properties:
        exec_id:
          type: string
        pid:
          type: integer
        command:
          type: string
        args:
          type: array
          items:
            type: string
        cwd:
          type: string
        uid:
          type: integer
          format: uint32
        started_at:
          type: string
          format: date-time
        running:
          type: boolean
        exit_code:
          type: integer
          nullable: true
        signal:
          type: string
        ended_at:
          type: string
          format: date-time
          nullable: true
        bytes_written:
          type: integer
          format: int64
        bytes_dropped:
          type: integer
          format: int64
        next_id:
          type: integer
          format: uint64
        ring_bytes:
          type: integer
          format: int64

    ExecBackgroundKillRequest:
      type: object
      properties:
        signal:
          type: string
          description: Signal name (TERM, KILL, INT, HUP, QUIT, USR1, USR2). Default TERM.
        grace_ms:
          type: integer
          description: >-
            Grace period (ms) before SIGTERM is escalated to SIGKILL. Default
            5000. Ignored for non-TERM signals.

    ExecBackgroundKillResponse:
      type: object
      properties:
        exec_id:
          type: string
        pid:
          type: integer
        running:
          type: boolean
        signal_sent:
          type: string

    ExecBackgroundWaitExitResponse:
      type: object
      description: >-
        Response from GET /vm/{hostname}/exec/{exec_id}/wait-exit. If
        `timed_out=true` the process was still running when the timeout
        elapsed; the caller may poll again.
      properties:
        exec_id:
          type: string
        running:
          type: boolean
        exit_code:
          type: integer
          nullable: true
        signal:
          type: string
        ended_at:
          type: string
          format: date-time
          nullable: true
        timed_out:
          type: boolean

    ExecBackgroundDeleteResponse:
      type: object
      properties:
        exec_id:
          type: string
        reaped:
          type: boolean

    SlicerExecResult:
      type: object
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
        error:
          type: string

    SlicerExecResult:
      type: object
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
        error:
          type: string

    SlicerAgentHealthResponse:
      type: object
      properties:
        hostname:
          type: string
        agent_uptime:
          type: integer
          format: int64
        agent_version:
          type: string
        system_uptime:
          type: integer
          format: int64
        userdata_ran:
          type: boolean

    # ---------------------------------------------------------------------
    # Slicer egress proxy admin: clients, upstream-credential secrets,
    # and per-client allow rules. The proxy injects a bound secret onto
    # the inner request when an allow rule matches, so real upstream
    # credentials never need to enter a guest VM.
    # ---------------------------------------------------------------------

    ProxyClient:
      type: object
      description: A proxy access token holder. Each rule is keyed by a client name.
      properties:
        name:
          type: string
        created_at:
          type: string
          format: date-time
      required: [name, created_at]

    CreateProxyClientRequest:
      type: object
      properties:
        name:
          type: string
        token:
          type: string
          description: Optional. When set, registers this literal as the client's token. When omitted, the proxy mints a high-entropy `spt_…` token and returns it once.
      required: [name]

    ProxyClientCreated:
      type: object
      description: Returned only by client create. The token is shown once and never returned by any other endpoint.
      properties:
        name:
          type: string
        token:
          type: string
        created_at:
          type: string
          format: date-time
      required: [name, token, created_at]

    ProxySecret:
      type: object
      description: An upstream credential. The `value` is never returned by list/get endpoints.
      properties:
        name:
          type: string
        host:
          type: string
        type:
          type: string
          description: Credential type. Empty is treated as `bearer` for backwards-compat.
          enum: [bearer, basic]
        created_at:
          type: string
          format: date-time
      required: [name, host, created_at]

    CreateProxySecretRequest:
      type: object
      properties:
        name:
          type: string
        host:
          type: string
        type:
          type: string
          description: Credential type. Default `bearer`.
          enum: [bearer, basic]
        value:
          type: string
          description: For `bearer`, the raw token. For `basic`, the value must be in `user:pass` form (the proxy base64-encodes it on the inner request).
      required: [name, host, value]

    ProxyAllowRule:
      type: object
      properties:
        host:
          type: string
          description: Exact host (`api.github.com`), suffix-wildcard (`*.github.com`), or `*` for any.
        secret:
          type: string
          description: Secret name to inject when this rule matches. Omit for pass-through allow.
        methods:
          type: array
          items: { type: string }
          description: |
            Optional HTTP-method filter. When set, the rule only matches
            requests whose method is in the list (case-insensitive).
            Omitted or empty = any method.
        paths:
          type: array
          items: { type: string }
          description: |
            Optional path filter. Each entry is an exact path
            (`/system/info`), `*` (any), or a suffix glob `<prefix>/*`
            matching anything strictly under the prefix. Omitted or
            empty = any path.
        passthrough:
          type: boolean
          description: |
            When true the proxy splices TCP both ways at CONNECT time
            without terminating TLS — no MITM, no inner-request
            inspection. The guest does **not** need to trust the proxy
            CA on a passthrough host, so cert-pinned clients work
            unchanged. The cost is no method/path/status visibility;
            the audit log carries host, port, byte counts, and
            duration. Mutually exclusive with `secret`, `methods`,
            and `paths`.
        expires:
          type: string
          format: date-time
          description: Optional rule expiry; expired rules are skipped on lookup and GC'd.
      required: [host]

    AddProxyAllowRequest:
      type: object
      properties:
        client:
          type: string
        host:
          type: string
        secret:
          type: string
        methods:
          type: array
          items: { type: string }
          description: Optional HTTP-method filter (see `ProxyAllowRule.methods`).
        paths:
          type: array
          items: { type: string }
          description: Optional path filter (see `ProxyAllowRule.paths`).
        passthrough:
          type: boolean
          description: |
            When true the proxy splices TCP without TLS termination
            (see `ProxyAllowRule.passthrough`). Mutually exclusive
            with `secret`, `methods`, `paths`; the server returns
            400 if combined.
        ttl_seconds:
          type: integer
          description: Optional TTL applied at create time. 0 (or omitted) = never expires.
      required: [client, host]

paths:
  /info:
    get:
      summary: Get server version info
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Server version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlicerInfo'
        "401":
          description: Missing or invalid auth
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /healthz:
    get:
      summary: Server liveness check
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema: { type: string, example: "OK" }
    head:
      summary: Server liveness check (HEAD)
      responses:
        "200":
          description: OK

  /hostgroup:
    get:
      summary: List host groups
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Host groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SlicerHostGroup'
        "401":
          description: Missing or invalid auth
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /hostgroup/{name}/nodes:
    get:
      summary: List nodes in a host group
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
        - in: query
          name: tag
          required: false
          schema: { type: string }
          description: Exact tag match filter. Only one of `tag` and `tag_prefix` may be set.
        - in: query
          name: tag_prefix
          required: false
          schema: { type: string }
          description: Tag prefix filter. Only one of `tag` and `tag_prefix` may be set.
      responses:
        "200":
          description: Nodes in host group
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NodeResponse' }
        "401":
          description: Missing or invalid auth
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

    post:
      summary: Create a node in a host group
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
        - in: query
          name: wait
          required: false
          schema:
            type: string
            enum: [agent, userdata]
          description: Wait on server side for VM readiness before returning. `agent` waits for the guest agent to report.
            `userdata` waits for both agent readiness and userdata completion.
        - in: query
          name: timeout
          required: false
          schema:
            type: string
          description: Maximum time to wait for the selected readiness signal (Go duration format, e.g. `30s`, `2m`). Defaults to `5m` when `wait` is set.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SlicerCreateNodeRequest' }
      responses:
        "200":
          description: Node created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlicerCreateNodeResponse' }
        "201":
          description: Node created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlicerCreateNodeResponse' }
        "400":
          description: Invalid input or limits exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "403":
          description: Trial mode or protected constraints
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "404":
          description: Host group not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "408":
          description: Wait timed out before readiness; VM is cleaned up before the error is returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /hostgroup/{name}/nodes/{node}:
    delete:
      summary: Delete a node
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
        - in: path
          name: node
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Node deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlicerDeleteResponse' }
        "403":
          description: Protected node cannot be deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "404":
          description: Node not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /nodes:
    get:
      summary: List all nodes
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: tag
          required: false
          schema: { type: string }
          description: Exact tag match filter. Only one of `tag` and `tag_prefix` may be set.
        - in: query
          name: tag_prefix
          required: false
          schema: { type: string }
          description: Tag prefix filter. Only one of `tag` and `tag_prefix` may be set.
      responses:
        "200":
          description: Nodes list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NodeResponse' }
        "401":
          description: Missing or invalid auth
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /nodes/stats:
    get:
      summary: List stats for all nodes
      security:
        - BearerAuth: []
      responses:
        "200":
          description: VM stats for all nodes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NodeStatResponse' }
        "401":
          description: Missing or invalid auth
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /node/{hostname}/stats:
    get:
      summary: Get stats for a single node
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
      responses:
        "200":
          description: VM stats for node
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeStatResponse' }
        "400":
          description: Invalid hostname
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "404":
          description: Node not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /secrets:
    get:
      summary: List secrets (metadata only)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of secrets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Secret' }
        "500":
          description: Secrets directory error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

    post:
      summary: Create secret
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSecretRequest' }
      responses:
        "201":
          description: Secret created
        "400":
          description: Invalid input or base64
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "409":
          description: Secret already exists
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /secrets/{name}:
    patch:
      summary: Update secret metadata and/or content
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSecretRequest' }
      responses:
        "200":
          description: Secret updated
        "400":
          description: Invalid input or base64
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "404":
          description: Secret not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

    delete:
      summary: Delete secret
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Secret deleted
        "404":
          description: Secret not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /vm/{hostname}/logs:
    get:
      summary: Get VM logs
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
        - in: query
          name: lines
          schema:
            type: integer
          description: Number of lines to return. 0 = full file.
      responses:
        "200":
          description: Logs response
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlicerLogsResponse' }
        "400":
          description: Invalid hostname or query
