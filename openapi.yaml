        "404":
          description: VM not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "409":
          description: VM is already running
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /vm/{hostname}/exec:
    get:
      summary: List background execs tracked on the VM
      description: >-
        Returns every background exec currently in the agent-side registry,
        including running and exited-but-not-yet-reaped entries. Filtering
        is client-side.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of tracked background execs.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ExecBackgroundInfo' }
        "404":
          description: VM not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    post:
      summary: Execute a command in the VM (streaming NDJSON or detached)
      description: >-
        When `background=true` the process is launched detached with a
        per-process ring buffer and the server returns 201 with an
        `exec_id`; subsequent interaction happens through the
        `/vm/{hostname}/exec/{exec_id}/...` endpoints. Otherwise the
        response streams NDJSON frames until the child exits.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
        - in: query
          name: cmd
          required: true
          schema: { type: string }
        - in: query
          name: args
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
        - in: query
          name: uid
          schema: { type: integer, format: uint32 }
        - in: query
          name: gid
          schema: { type: integer, format: uint32 }
        - in: query
          name: stdin
          schema: { type: boolean }
        - in: query
          name: stdout
          schema: { type: boolean }
        - in: query
          name: stderr
          schema: { type: boolean }
        - in: query
          name: shell
          schema: { type: string }
        - in: query
          name: cwd
          schema: { type: string }
        - in: query
          name: permissions
          schema: { type: string }
        - in: query
          name: buffered
          schema: { type: boolean }
        - in: query
          name: background
          schema: { type: boolean }
          description: >-
            Launch detached and return 201 with an exec_id. Incompatible
            with stdin=true and buffered=true.
        - in: query
          name: ring_bytes
          schema: { type: integer, format: int64 }
          description: Ring buffer cap in bytes when background=true (default 1 MiB).
      requestBody:
        description: Optional raw stdin stream when stdin=true.
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "200":
          description: Stream of JSON lines with exec output (default). When `buffered=true`, returns one JSON object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlicerExecResult' }
            application/x-ndjson:
              schema: { $ref: '#/components/schemas/SlicerExecWriteResult' }
        "201":
          description: Background exec launched. Returned only when `background=true`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExecBackgroundResponse' }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "404":
          description: VM not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "409":
          description: VM paused
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "503":
          description: Agent-wide ring buffer budget exhausted (background mode).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /vm/{hostname}/exec/{exec_id}:
    parameters:
      - in: path
        name: hostname
        required: true
        schema: { type: string }
      - in: path
        name: exec_id
        required: true
        schema: { type: string }
    get:
      summary: Fetch status of a background exec
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Info snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExecBackgroundInfo' }
        "410":
          description: Exec was reaped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    delete:
      summary: Reap a background exec
      description: >-
        Frees the ring buffer and removes the registry entry. Does NOT kill
        a running process — pair with POST .../kill for stop-and-clean-up.
        After reap, subsequent info/logs/kill/wait-exit calls return 410
        Gone.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Reaped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExecBackgroundDeleteResponse' }
        "410":
          description: Already reaped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /vm/{hostname}/exec/{exec_id}/logs:
    get:
      summary: Stream or replay a background exec's log ring
      description: >-
        Replays everything currently in the ring by default. With
        `follow=true` the response stays open and streams live frames until
        the child exits or the client disconnects. With `from_id` the
        replay starts at that frame id; if the id has been evicted the
        server emits a `type=gap` frame and continues from the oldest
        available.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
        - in: path
          name: exec_id
          required: true
          schema: { type: string }
        - in: query
          name: follow
          schema: { type: boolean }
        - in: query
          name: from_id
          schema: { type: integer, format: uint64 }
      responses:
        "200":
          description: NDJSON frame stream.
          content:
            application/x-ndjson:
              schema: { $ref: '#/components/schemas/SlicerExecWriteResult' }
        "410":
          description: Exec was reaped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /vm/{hostname}/exec/{exec_id}/kill:
    post:
      summary: Signal a background exec
      description: >-
        Sends a signal to the process group. If signal=TERM (default) and
        the process is still running after grace_ms, the agent escalates to
        SIGKILL.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
        - in: path
          name: exec_id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExecBackgroundKillRequest' }
      responses:
        "200":
          description: Signal sent (or no-op if already exited).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExecBackgroundKillResponse' }
        "410":
          description: Exec was reaped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /vm/{hostname}/exec/{exec_id}/wait-exit:
    get:
      summary: Long-poll until a background exec exits
      description: >-
        Blocks until the child exits or `timeout` seconds elapse. Default
        timeout is 30s; cap is 600s. On timeout the caller may invoke again.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema: { type: string }
        - in: path
          name: exec_id
          required: true
          schema: { type: string }
        - in: query
          name: timeout
          schema: { type: integer }
          description: Timeout in seconds (default 30, max 600).
      responses:
        "200":
          description: Exit status (or `timed_out=true`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExecBackgroundWaitExitResponse' }
        "410":
          description: Exec was reaped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

